name: Deploy to GitHub Pages

# Build the Vite app and publish dist/ to GitHub Pages on every push to main.
# Served at https://mchord.mpump.live — the custom domain is held by public/CNAME,
# which Vite copies into dist/ so the artifact-based deploy preserves it across
# deploys (no gh-pages branch).
#
# One-time setup:
#   repo → Settings → Pages → Source: "GitHub Actions"
#   add DNS: CNAME  mchord → <owner>.github.io   (per your DNS provider)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Build and upload the Pages artifact. Kept separate from deploy so that
  # re-running only the deploy job never re-runs upload-pages-artifact — a
  # second upload leaves two "github-pages" artifacts in the run and makes
  # deploy-pages fail with "Multiple artifacts named github-pages".
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
